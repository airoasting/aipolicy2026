<title>Thumbnail · AI 정책 카탈로그 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  @font-face{
    font-family:'Pretendard';
    src:url('../fonts/PretendardVariable.ttf') format('truetype');
    font-weight:100 900; font-style:normal;
  }
  :root{
    --paper:#F1E6CB; --paper-dk:#E5D6B0; --ink:#3A2516; --sub:#7a6243;
    --red:#E5392A; --pink:#E54489; --orange:#F09131; --orange-dk:#D2670C;
    --green:#3D9F47; --blue:#3F8BC4; --yellow:#F0BC2A;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;
    background:var(--paper); color:var(--ink);
    position:relative; word-break:keep-all;
    -webkit-font-smoothing:antialiased;
  }
  .disp{font-family:'Big Shoulders Display','Pretendard',sans-serif;font-weight:900;letter-spacing:-.02em;line-height:.86}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace}
  em{font-style:normal;color:var(--red)}

  /* 종이 그레인 + 비네트 */
  #grain{position:absolute;inset:0;z-index:40;pointer-events:none;
    background-image:radial-gradient(circle at 1px 1px, rgba(58,37,22,0.55) 1px, transparent 1.6px);
    background-size:4px 4px;opacity:.16;mix-blend-mode:multiply}
  #vign{position:absolute;inset:0;z-index:39;pointer-events:none;
    background:radial-gradient(120% 120% at 50% 40%, transparent 60%, rgba(58,37,22,.12) 100%)}

  /* 외곽 인쇄 프레임 */
  .frame{position:absolute;inset:26px;border:2px solid var(--ink);z-index:5;pointer-events:none}
  .frame::before{content:"";position:absolute;inset:6px;border:1px solid rgba(58,37,22,.42)}

  /* 상단 헤더 라인 */
  .top{position:absolute;left:60px;right:60px;top:54px;z-index:10;
    display:flex;align-items:center;justify-content:space-between;
    padding-bottom:13px;border-bottom:2px solid var(--ink)}
  .brand{display:flex;align-items:center;gap:13px}
  .brand img{width:42px;height:42px;border-radius:50%;border:1.6px solid var(--ink);display:block}
  .brand .bt{font-family:'Big Shoulders Display','Pretendard',sans-serif;font-weight:900;
    font-size:22px;letter-spacing:.01em;line-height:1;color:var(--ink)}
  .brand .bt s{color:var(--red);text-decoration:none;margin:0 .3em;font-weight:900}
  .top .ed{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--sub);font-weight:700;text-align:right;line-height:1.55}

  /* 본문 스테이지 */
  .stage{position:absolute;left:60px;top:134px;z-index:10;max-width:640px}
  .kicker{display:inline-flex;align-items:center;gap:10px;font-size:14px;letter-spacing:.06em;
    color:var(--ink);font-weight:800;margin-bottom:18px}
  .kicker .tag{background:var(--orange-dk);color:var(--paper);font-family:'Big Shoulders Display',sans-serif;
    font-weight:900;font-size:14px;letter-spacing:.05em;padding:4px 11px;transform:rotate(-2deg);border:1.4px solid var(--ink)}

  .hero{font-size:104px;color:var(--ink);margin-bottom:4px}
  h1{font-weight:900;font-size:46px;line-height:1.05;letter-spacing:-.02em;color:var(--ink);max-width:620px}
  h1 .hl{background:linear-gradient(transparent 62%, rgba(229,68,137,.42) 62%)}

  .lead{font-size:18px;line-height:1.5;color:var(--ink);font-weight:500;margin-top:16px;max-width:560px}
  .lead em{font-weight:800}

  /* 통계 */
  .stats{display:flex;gap:0;margin-top:24px;border-top:2px solid var(--ink);width:560px}
  .stat{flex:1;padding:14px 4px 0;border-right:1.4px solid rgba(58,37,22,.3)}
  .stat:last-child{border-right:none}
  .stat b{display:block;font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:46px;line-height:.9;color:var(--ink)}
  .stat:nth-child(1) b{color:var(--red)} .stat:nth-child(2) b{color:var(--blue)} .stat:nth-child(3) b{color:var(--green)}
  .stat span{display:block;font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--sub);margin-top:6px}

  /* 우측 데코: 리본 + 인장 (헤더 아래 우측 거터) */
  .ribbons{position:absolute;right:0;top:188px;width:440px;height:360px;z-index:6;overflow:hidden}
  .ribbon{position:absolute;width:620px;height:30px;transform:rotate(-30deg);transform-origin:left center;opacity:.92;
    box-shadow:0 1px 0 rgba(58,37,22,.2)}
  .ribbon:nth-child(1){background:var(--green);top:0px;left:-30px}
  .ribbon:nth-child(2){background:var(--red);top:48px;left:-30px}
  .ribbon:nth-child(3){background:var(--yellow);top:96px;left:-30px}
  .ribbon:nth-child(4){background:var(--blue);top:144px;left:-30px}
  .ribbon:nth-child(5){background:var(--orange);top:192px;left:-30px}

  .seal{position:absolute;right:96px;top:150px;width:146px;height:146px;background:var(--ink);color:var(--paper);z-index:9;
    clip-path:polygon(50% 0,61% 21%,85% 15%,79% 39%,100% 50%,79% 61%,85% 85%,61% 79%,50% 100%,39% 79%,15% 85%,21% 61%,0 50%,21% 39%,15% 15%,39% 21%);
    display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;line-height:1;transform:rotate(-8deg)}
  .seal b{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:46px}
  .seal i{font-style:normal;font-size:11px;letter-spacing:.06em;margin-bottom:2px;font-weight:700;opacity:.85}
  .seal span{font-size:10px;letter-spacing:.14em;margin-top:3px;font-weight:700}

  /* 푸터 */
  .foot{position:absolute;left:60px;right:60px;bottom:50px;z-index:10;
    display:flex;align-items:center;justify-content:flex-end;
    font-size:12.5px;letter-spacing:.05em;color:var(--sub);font-weight:700}
  .foot .url{color:var(--ink)}
</style>
</head>
<body>
  <div id="vign"></div>

  <div class="frame"></div>

  <div class="top">
    <div class="brand">
      <img src="../logos/logo1-transparent.png" alt="">
      <span class="bt">AI ROASTING<s>/</s>AI 정책 카탈로그 2026</span>
    </div>
    <div class="ed">제9회 전국동시지방선거<br>2026 · 인공지능 정책 모음집</div>
  </div>

  <div class="ribbons">
    <span class="ribbon"></span><span class="ribbon"></span><span class="ribbon"></span>
    <span class="ribbon"></span><span class="ribbon"></span>
  </div>
  <div class="stage">
    <div class="kicker"><span class="tag">CATALOG 2026</span> 당선인 공약 아카이브</div>
    <div class="hero disp">AI <em>2026</em></div>
    <h1>16개 지역 시장·도지사의<br><span class="hl">인공지능 공약</span></h1>
    <p class="lead"><em>6·3 지방선거</em>에서 당선된 광역단체장 16인이 내건 AI 공약을 출처와 함께 정리했습니다.</p>
    <div class="stats">
      <div class="stat"><b>16</b><span>시 · 도</span></div>
      <div class="stat"><b>8</b><span>정책 분야</span></div>
      <div class="stat"><b>108</b><span>AI 공약</span></div>
    </div>
  </div>

  <div class="foot">
    <span>Researched with Liner &middot; Designed by Claude Opus 4.8</span>
  </div>

  <div id="grain"></div>
</body>
</html>
